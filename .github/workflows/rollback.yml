name: Rollback — Deploy specific image tag

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Git SHA или тег для отката (например: abc1234 или latest)"
        required: true
        type: string
      reason:
        description: "Причина отката"
        required: false
        default: "manual rollback"
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/coremarket-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/coremarket-frontend

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.image_tag }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Create rollback script
        env:
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMG_BACKEND: ${{ env.IMAGE_BACKEND }}:${{ github.event.inputs.image_tag }}
          IMG_FRONTEND: ${{ env.IMAGE_FRONTEND }}:${{ github.event.inputs.image_tag }}
          IMG_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          cat > /tmp/rollback.sh << EOF
          set -e
          cd ~/CoreMarket
          echo "${DH_TOKEN}" | docker login -u "${DH_USER}" --password-stdin
          export IMAGE_BACKEND="${IMG_BACKEND}"
          export IMAGE_FRONTEND="${IMG_FRONTEND}"
          echo "Rolling back to: ${IMG_TAG}"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.gcp.yml pull backend frontend
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.gcp.yml up -d --no-build
          echo "Rollback complete."
          EOF

      - name: SSH Rollback
        run: |
          VM_USER=$(echo "${{ secrets.VM_USER }}" | tr -d '[:space:]')
          VM_HOST=$(echo "${{ secrets.VM_HOST }}" | tr -d '[:space:]')
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "${VM_USER}@${VM_HOST}" \
            bash < /tmp/rollback.sh

      - name: Smoke test
        run: |
          sleep 25
          curl --retry 8 --retry-delay 10 --retry-connrefused \
            --retry-all-errors --max-time 15 \
            -sf "${{ vars.PUBLIC_URL }}" -o /dev/null \
            && echo "OK" || (echo "SITE DOWN AFTER ROLLBACK" && exit 1)

      - name: Telegram notify
        if: always()
        run: |
          EMOJI="✅"
          [ "${{ job.status }}" = "failure" ] && EMOJI="🚨"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="${EMOJI} <b>ROLLBACK ${{ job.status }}</b>%0ATag: <code>${{ github.event.inputs.image_tag }}</code>%0AПричина: ${{ github.event.inputs.reason }}%0AАвтор: ${{ github.actor }}"
