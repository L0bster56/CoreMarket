name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coremarket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_NAME: coremarket_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      ASYNC_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/coremarket_test
      DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/coremarket_test
      JWT_SECRET: ci-test-secret-key-not-for-production
      JWT_ACCESS_TOKEN_EXPIRES: 1800
      JWT_REFRESH_TOKEN_EXPIRES: 604800
      JWT_ALGORITHM: HS256
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: coremarket-test
      MINIO_PUBLIC_URL: http://localhost:9000
      ELASTICSEARCH_URL: http://localhost:9200
      SEARCH_ENABLED: "false"
      CELERY_TASK_ALWAYS_EAGER: "true"
      LOG_LEVEL: WARNING
      LOG_FORMAT: text
      OTEL_ENABLED: "false"
      PROMETHEUS_ENABLED: "false"
      TELEGRAM_ALERTS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install "poetry>=2.0.0,<3.0.0"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            poetry-

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-root --no-interaction

      - name: Run migrations
        working-directory: backend
        run: poetry run alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: poetry run pytest tests/ -v --tb=short -q

  frontend-lint:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npx eslint src/ --max-warnings=0
        continue-on-error: true
