name: CD — Deploy to GCP

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag для деплоя (git SHA или 'latest'). Пусто — последний SHA."
        required: false
        default: ""

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/coremarket-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/coremarket-frontend

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Сборка образов и пуш на DockerHub
  # ─────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            TAG="${{ github.event.workflow_run.head_sha }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:latest
          cache-to: type=inline

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_URL }}/api/v1
            INTERNAL_API_URL=https://sanjaranvarov.uz/api/v1
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────────
  # Job 2: SSH деплой на GCP VM
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Create deploy script
        env:
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMG_BACKEND: ${{ env.IMAGE_BACKEND }}:${{ needs.build-push.outputs.image_tag }}
          IMG_FRONTEND: ${{ env.IMAGE_FRONTEND }}:${{ needs.build-push.outputs.image_tag }}
          IMG_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          cat > /tmp/deploy.sh << EOF
          set -e
          cd ~/CoreMarket
          git fetch origin main
          git reset --hard origin/main
          echo "${DH_TOKEN}" | docker login -u "${DH_USER}" --password-stdin
          export IMAGE_BACKEND="${IMG_BACKEND}"
          export IMAGE_FRONTEND="${IMG_FRONTEND}"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.gcp.yml pull backend frontend
          docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.gcp.yml up -d --no-build
          docker image prune -f --filter "until=48h"
          echo "Deployed: ${IMG_TAG}"
          EOF

      - name: Verify key fingerprint
        run: ssh-keygen -l -f ~/.ssh/deploy_key

      - name: SSH Deploy
        run: |
          VM_USER=$(echo "${{ secrets.VM_USER }}" | tr -d '[:space:]')
          VM_HOST=$(echo "${{ secrets.VM_HOST }}" | tr -d '[:space:]')
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "${VM_USER}@${VM_HOST}" \
            bash < /tmp/deploy.sh

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Smoke test — проверяем что сайт поднялся
  # ─────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build-push, deploy]

    steps:
      - name: Wait for services
        run: sleep 25

      - name: Check frontend
        run: |
          BASE_URL="http://$(echo '${{ secrets.VM_HOST }}' | tr -d '[:space:]')"
          curl --retry 8 --retry-delay 10 --retry-connrefused \
            --retry-all-errors --max-time 15 \
            -sf "${BASE_URL}" -o /dev/null \
            && echo "Frontend OK" \
            || (echo "Frontend FAILED" && exit 1)

      - name: Check backend API
        run: |
          BASE_URL="http://$(echo '${{ secrets.VM_HOST }}' | tr -d '[:space:]')"
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            --retry-all-errors --max-time 15 \
            -sf "${BASE_URL}/api/v1/items?limit=1" -o /dev/null \
            && echo "Backend API OK" \
            || (echo "Backend API FAILED" && exit 1)

      - name: Telegram — success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>Deploy успешно</b>%0ATag: <code>${{ needs.build-push.outputs.image_tag }}</code>%0AURL: ${{ vars.PUBLIC_URL }}"

      - name: Telegram — failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Deploy упал или сайт недоступен</b>%0ATag: <code>${{ needs.build-push.outputs.image_tag }}</code>"
